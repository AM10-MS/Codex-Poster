<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <meta property="og:title" content="Bring Your Kid Day - Build a Game with Codex">
  <meta property="og:image" content="/assets/poster-16x9-faithful.png">
  <title>Bring Your Kid Day - Build a Game with Codex</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #000;
      overflow: hidden;
      overscroll-behavior: none;
    }

    body {
      min-height: 100dvh;
    }

    .poster-stage {
      position: fixed;
      inset: 0;
      width: 100dvw;
      height: 100dvh;
      background: #000;
    }

    .poster-stage img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      user-select: none;
      -webkit-user-drag: none;
    }

  </style>
</head>
<body>
  <main class="poster-stage" aria-label="Bring Your Kid Day Build a Game with Codex poster">
    <img src="./assets/poster-16x9-faithful.png" alt="Bring Your Kid Day Build a Game with Codex widescreen poster">
  </main>
</body>
</html>
